<link rel="stylesheet" type="text/css" href="https://cdn.jsdelivr.net/npm/jsxgraph@1.12.2/distrib/jsxgraph.css" />
<div id="snap_arc" class="jxgbox" style="width:500px;height:500px"></div>
<script>
(function() {
  var boardCode = 'var board_snap_arc = JXG.JSXGraph.initBoard(\'snap_arc\', {"showNavigation":false,"showCopyright":false,"axis":true,"boundingbox":[-5,5,5,-5]});\nvar el_001 = board_snap_arc.create(\'point\', [0,0], {"name":"C"});\nvar el_002 = board_snap_arc.create(\'point\', [3,0], {"name":"P1"});\nvar el_003 = board_snap_arc.create(\'point\', [0,3], {"name":"P2"});\nvar el_004 = board_snap_arc.create(\'arc\', [el_001,el_002,el_003], {"strokeColor":"orange"});\n';
  function runBoard() { try { eval(boardCode); } catch(ex) { console.error('JSXGraph board error:', ex); } }
  if (typeof JXG !== 'undefined') {
    runBoard();
  } else if (typeof require !== 'undefined') {
    require.config({paths:{'jsxgraph':'https://cdn.jsdelivr.net/npm/jsxgraph@1.12.2/distrib/jsxgraphcore.min'}});
    require(['jsxgraph'], function(JXG) { window.JXG = JXG; runBoard(); });
  } else {
    var s = document.createElement('script');
    s.src = 'https://cdn.jsdelivr.net/npm/jsxgraph@1.12.2/distrib/jsxgraphcore.js';
    s.onload = runBoard;
    document.head.appendChild(s);
  }
})();
</script>
