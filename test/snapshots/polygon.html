<link rel="stylesheet" type="text/css" href="https://cdn.jsdelivr.net/npm/jsxgraph@1.12.2/distrib/jsxgraph.css" />
<div id="snap_polygon" class="jxgbox" style="width:500px;height:500px"></div>
<script>
(function() {
  var boardCode = 'var board_snap_polygon = JXG.JSXGraph.initBoard(\'snap_polygon\', {"axis":true,"boundingbox":[-5,5,5,-5],"showCopyright":false,"showNavigation":false});\nvar el_001 = board_snap_polygon.create(\'point\', [0,0], {"name":"A"});\nvar el_002 = board_snap_polygon.create(\'point\', [4,0], {"name":"B"});\nvar el_003 = board_snap_polygon.create(\'point\', [2,3], {"name":"C"});\nvar el_004 = board_snap_polygon.create(\'polygon\', [el_001,el_002,el_003], {"fillColor":"yellow","fillOpacity":0.3});\n';
  function runBoard() { try { eval(boardCode); } catch(ex) { console.error('JSXGraph board error:', ex); } }
  if (typeof JXG !== 'undefined') {
    runBoard();
  } else if (typeof require !== 'undefined') {
    require.config({paths:{'jsxgraph':'https://cdn.jsdelivr.net/npm/jsxgraph@1.12.2/distrib/jsxgraphcore.min'}});
    require(['jsxgraph'], function(JXG) { window.JXG = JXG; runBoard(); });
  } else {
    var s = document.createElement('script');
    s.src = 'https://cdn.jsdelivr.net/npm/jsxgraph@1.12.2/distrib/jsxgraphcore.js';
    s.onload = runBoard;
    document.head.appendChild(s);
  }
})();
</script>
